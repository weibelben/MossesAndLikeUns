server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json;

    location /api/ {
        try_files $uri =404;
        default_type application/json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}